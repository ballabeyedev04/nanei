# ============================================================
#  Nanei API — Configuration Nginx (reverse proxy)
#  À copier dans : /etc/nginx/sites-available/nanei
#  Puis activer : ln -s /etc/nginx/sites-available/nanei /etc/nginx/sites-enabled/
#  Et recharger : systemctl reload nginx
# ============================================================

upstream nanei_backend {
  # Le backend Node.js tourne sur 127.0.0.1:3000 (docker-compose.prod.yml)
  server 127.0.0.1:3000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Redirection HTTP → HTTPS (Let's Encrypt)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.nanei.com;  # Adapter selon votre domaine

  # ── Certificats Let's Encrypt ──────────────────────────────────────────────
  ssl_certificate /etc/letsencrypt/live/api.nanei.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.nanei.com/privkey.pem;

  # Configuration SSL sécurisée
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # ── Limits ─────────────────────────────────────────────────────────────────
  # Limiter la taille des uploads à 5MB (adapter selon vos besoins)
  client_max_body_size 5M;

  # ── Gzip compression ───────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript
             application/json application/javascript application/xml+rss
             application/rss+xml font/truetype font/opentype
             application/vnd.ms-fontobject image/svg+xml;

  # ── Reverse Proxy vers le backend Node.js ──────────────────────────────────
  location / {
    proxy_pass http://nanei_backend;

    # Headers importants pour Express
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
  }

  # ── Statique (logs, uploads optionnels) ─────────────────────────────────────
  # À adapter selon votre structure
  location /uploads/ {
    alias /var/www/nanei-api/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # ── Monitoring (santé du service) ──────────────────────────────────────────
  location = /health {
    proxy_pass http://nanei_backend;
    access_log off;  # Pas de logs pour /health (bruit)
  }

  # ── Logs ───────────────────────────────────────────────────────────────────
  access_log /var/log/nginx/nanei-api-access.log combined;
  error_log /var/log/nginx/nanei-api-error.log warn;
}
