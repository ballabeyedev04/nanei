# ============================================================
#  Nanei API — Docker Compose DÉVELOPPEMENT
#  Usage : docker compose up --build
#  Pour la production : docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nanei_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-nanei}
      POSTGRES_USER:     ${DB_USER:-naneiuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-naneipassword}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    # En dev uniquement : exposer le port pour se connecter via pgAdmin / DBeaver
    ports:
      - "5432:5432"
    networks:
      - nanei_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-naneiuser} -d ${DB_NAME:-nanei}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend Node.js ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanei_backend_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV:  development
      PORT:      3000
      DB_HOST:   postgres
      DB_PORT:   5432
      DB_NAME:   ${DB_NAME:-nanei}
      DB_USER:   ${DB_USER:-naneiuser}
      DB_PASSWORD: ${DB_PASSWORD:-naneipassword}
      DB_SSL_CA: ""
      LOG_DIR:   /app/logs
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      # En dev : montage du code source pour hot-reload (commenté en prod)
      # - ./src:/app/src
    networks:
      - nanei_network

networks:
  nanei_network:
    driver: bridge

volumes:
  postgres_data_dev:
